server:
  host: "0.0.0.0"
  port: 8080

auth:
  jwt_secret: "${LINKNEST_JWT_SECRET}"
  token_ttl_hours: 168

database:
  driver: "sqlite"
  dsn: "/var/lib/linknest/linknest.db"

storage:
  type: "local"
  root_dir: "/var/lib/linknest/storage"
  chunk_dir: "/var/lib/linknest/chunks"

transfer:
  chunk_size: 4194304
  heartbeat_interval_seconds: 5
  offline_timeout_seconds: 15
